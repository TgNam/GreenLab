<app-modal-content [visible]="visible" [size]="'lg'" [title]="'ADMINISTRATOR.EDIT_TITLE' | translate"
  [saveButtonText]="'COMMON.SAVE' | translate" [closeButtonText]="'COMMON.CLOSE' | translate" [disableSave]="
    !admin?.full_name?.trim() ||
    !admin?.user_name?.trim() ||
    !admin?.phone?.trim() ||
    !admin?.department_id ||
    !admin?.work_area_id ||
    errMsg.length > 0" [loading]="updating" (onSave)="onSave()" (onClose)="onClose()">
  <div class="modal-body">
    <div *ngIf="admin; else loading" class="row">
      <!-- Cột trái -->
      <div class="col-md-8">
        <div class="mb-2">
          <app-form-input [label]="'COMMON.NAME' | translate" type="text" [max]="150" [(model)]="admin.full_name"
            labelType="required">
          </app-form-input>
        </div>

        <div class="mb-2">
          <app-form-input [label]="'COMMON.USERNAME' | translate" type="text" [max]="150" [(model)]="admin.user_name"
            labelType="required" (modelChange)="validateParam('username', $event)"></app-form-input>
         
            <div *ngFor="let err of errMsg" class="text-danger mt-1">
            <span *ngIf="err.type == 'username'">{{ err.label }}</span>
          </div>
          
        </div>

        <div class="mb-2">
          <app-form-input [label]="'Email'" type="text" [max]="250" [disabled]="true" [(model)]="admin.email"
            (modelChange)="validateParam('email', $event)" labelType="required">
          </app-form-input>
        </div>

        <div class="mb-2">
          <app-form-input [selectOpen]="onOpen" [selectClose]="selectClose" [label]="'COMMON.DEPARTMENT' | translate" type="select-search" [options]="departments"
            [searchText]="searchDepartment" optionLabel="name" optionValue="id" [labelType]="'required'"
            [(model)]="admin.department_id" [placeholder]="'COMMON.DEPARTMENT_PLACEHOLDER' | translate">
          </app-form-input>
          <div *ngFor="let err of errMsg" class="text-danger mt-1">
            <span *ngIf="err.type == 'department'">{{ err.label }}</span>
          </div>
        </div>

        <div class="mb-2">
          <app-form-input [selectOpen]="onOpen" [selectClose]="selectClose" [label]="'COMMON.WORK_AREA' | translate" type="select-search" [options]="workAreas"
            [searchText]="searchWorkArea" optionLabel="name" optionValue="id" [labelType]="'required'"
            [(model)]="admin.work_area_id" [placeholder]="'COMMON.WORK_AREA_PLACEHOLDER' | translate">
          </app-form-input>
          <div *ngFor="let err of errMsg" class="text-danger mt-1">
            <span *ngIf="err.type == 'department'">{{ err.label }}</span>
          </div>
        </div>

        <!-- <div class="mb-2">
          <app-form-input [selectOpen]="onOpen" [selectClose]="selectClose" [label]="'COMMON.AREA' | translate" class="ng-select-parent"  type="select-search" [options]="workAreas"
            [searchText]="searchArea" optionLabel="name" optionValue="id" [labelType]="'required'"
            [(model)]="admin.area_id" [placeholder]="'COMMON.AREA_PLACEHOLDER' | translate">
          </app-form-input>

          <div *ngFor="let err of errMsg" class="text-danger mt-1">
            <span *ngIf="err.type == 'area'">{{ err.label }}</span>
          </div>
        </div> -->

        <div class="mb-2">
          <app-form-input [label]="'COMMON.PASSWORD' | translate" [placeholder]="'COMMON.PASSWORD' | translate"
            type="password" [max]="30" [(model)]="admin.password" (modelChange)="validateParam('password', $event)"
            >
          </app-form-input>
          <div *ngFor="let err of errMsg" class="text-danger mt-1">
            <span *ngIf="err.type == 'password'">{{ err.label }}</span>
          </div>
        </div>

        <div class="mb-2">
          <app-form-input [label]="'COMMON.PHONE' | translate" type="phone" [max]="13" [(model)]="admin.phone"
            (modelChange)="validateParam('phone', $event)" labelType="required">
          </app-form-input>
          <div *ngFor="let err of errMsg" class="text-danger mt-1">
            <span *ngIf="err.type == 'phone'">{{ err.label }}</span>
          </div>
        </div>
        <div class="mb-2">
          <app-form-input [label]="'COMMON.BARCODE' | translate" type="phone" [max]="150" [(model)]="admin.start_barcode"
            >
          </app-form-input>
        </div>
        <div class="mb-2">
          <app-form-input *ngIf="positions" [selectOpen]="onOpen" [selectClose]="selectClose" [label]="'COMMON.POSITION1' | translate" type="select-search" [options]="positions"
           optionLabel="label" optionValue="value" 
            [(model)]="admin.position" [placeholder]="'COMMON.POSITION1' | translate">
          </app-form-input>
        </div>
        <div class="mb-2 d-flex align-items-center">
          <app-form-input type="checkbox" [for]="'status'" [(model)]="admin.status"
            [label]="admin.status === 1 ||admin.status  ? ('COMMON.ACTIVE' | translate) : ('COMMON.INACTIVE' | translate) "
            (modelChange)="changeStatus($event)" >
          </app-form-input>



          <!-- <label class="fw-semibold me-2 mr-1">{{ 'COMMON.STATUS' | translate }}:</label>
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              id="statusSwitch"
              [checked]="admin.status === 1"
              (change)="admin.status = $event.target.checked ? 1 : 0"
            />
            <label class="form-check-label" for="statusSwitch">
              {{ admin.status === 1 ? ('COMMON.ACTIVE' | translate) : ('COMMON.INACTIVE' | translate) }}
            </label>
          </div> -->
        </div>
      </div>

      <!-- Cột phải: upload ảnh -->
      <div class="col-md-4 text-center">
        <app-form-input
          #adminPhotoUpload
          type="image-upload"
          imageShape="round"
          [imagePreviewUrl]="previewPhoto || admin?.photo"
          imageFallbackUrl="assets/images/avatars/avatar-default.png"
          [imageAltText]="'COMMON.IMAGE' | translate"
          [imageButtonLabel]="'COMMON.CHOOSE_IMAGE' | translate"
          [imageErrors]="errMsg"
          imageErrorKey="photo"
          (imageFileChange)="onPhotoSelected($event)"
          (imageClear)="onPhotoClear()">
        </app-form-input>

        <app-form-input
          #adminSignatureUpload
          class="mt-2"
          type="image-upload"
          imageShape="rectangle"
          [imagePreviewUrl]="previewAvatar || admin?.digital_signature"
          imageFallbackUrl="assets/images/illustration/digital-signature.jpg"
          [imageAltText]="'COMMON.DIGITAL_SIGNATURE' | translate"
          [imageButtonLabel]="'COMMON.CHOOSE_DIGITAL_SIGNATURE' | translate"
          [imageErrors]="errMsg"
          imageErrorKey="avatar"
          (imageFileChange)="onAvatarSelected($event)"
          (imageClear)="onAvatarClear()">
        </app-form-input>
      </div>
    </div>

    <ng-template #loading>
      <div class="text-center p-3">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </ng-template>
  </div>
</app-modal-content>
