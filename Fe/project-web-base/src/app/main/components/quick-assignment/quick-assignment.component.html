<div class="quick-assignment-container">
  <!-- Header with button and search -->
  <div class="mb-3">
    <div class="d-flex gap-2 flex-wrap align-items-center mb-2">
      <button 
        class="btn btn-sm mr-1" 
        [ngClass]="buttonClass"
        (click)="onButtonClickHandler()"
        [disabled]="getSelectedCount() === 0">
        {{ buttonText }}
      </button>
      
      <div *ngIf="showSelectAll" class="ms-auto">
        <div class="form-check">
          <input 
            class="form-check-input" 
            type="checkbox" 
            id="selectAllCheckbox"
            [(ngModel)]="allSelected"
            (change)="toggleSelectAll()">
          <label class="form-check-label" for="selectAllCheckbox">
            Chọn tất cả
          </label>
        </div>
      </div>
    </div>
    
    <div *ngIf="showSearch" class="mb-2">
      <input 
        type="text" 
        class="form-control form-control-sm" 
        [placeholder]="searchPlaceholder"
        [(ngModel)]="searchText"
        (ngModelChange)="onSearchChange($event)">
    </div>
    
    <div *ngIf="getSelectedCount() > 0" class="text-muted small">
      Đã chọn: {{ getSelectedCount() }} / {{ items.length }}
    </div>
  </div>
  
  <!-- Items grid -->
  <div class="quick-assignment-grid" [style.grid-template-columns]="'repeat(' + columns + ', 1fr)'">
    <div 
      *ngFor="let item of filteredItems; trackBy: trackByItemId"
      class="quick-assignment-item"
      [class.selected]="isSelected(item.id)">
      <app-form-input
        type="checkbox"
        [for]="'item-' + item.id"
        [label]="item.label"
        [model]="isSelected(item.id)"
        (modelChange)="toggleItem(item)">
      </app-form-input>
    </div>
  </div>
  
  <!-- Empty state -->
  <div *ngIf="filteredItems.length === 0" class="text-center text-muted py-4">
    <p>Không tìm thấy kết quả</p>
  </div>
</div>
